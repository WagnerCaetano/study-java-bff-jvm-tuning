server:
  port: 8080
  undertow:
    threads:
      io: 4
      worker: 200

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, metrics
  metrics:
    tags:
      application: bff-blocking
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.9,0.95,0.99
      sla:
        http.server.requests: 50ms,100ms,150ms,200ms,300ms,500ms,1000ms
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.wagnercaetano: INFO
